# configmap.yaml
# A ConfigMap stores non-sensitive configuration as key-value pairs.
# This is how Kubernetes manages environment variables without
# hardcoding them into the container image.
# Secrets (API keys, passwords) would use a Secret resource instead.

apiVersion: v1
kind: ConfigMap
metadata:
  name: iris-api-config
  namespace: default
  labels:
    app: iris-api
    project: k8s-iris-deployment
data:
  APP_ENV: "production"
  MODEL_VERSION: "1.0.0"
  LOG_LEVEL: "info"